    const userInitialsElement = document.getElementById('userInitials');

      if (user) {
        if (userNameElement) userNameElement.textContent = user.email; 
        if (userInitialsElement && user.email) userInitialsElement.textContent = user.email[0].toUpperCase();

        try {
          const userDocRef = doc(db, "usuarios", user.uid);
          const userDoc = await getDoc(userDocRef);

          if (userDoc.exists()) {
            const userData = userDoc.data();
            const displayName = userData.nome || user.email; 

            if (userNameElement) userNameElement.textContent = displayName;
            
            if (userInitialsElement && userData.nome) {
              const initials = userData.nome.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
              userInitialsElement.textContent = initials;
            } else if (userInitialsElement && user.email) {
              userInitialsElement.textContent = user.email[0].toUpperCase();
            }
          } else {
            console.log("Documento do usuário não encontrado em Firestore, usando e-mail como fallback.");
          }
        } catch (error) {
          console.error('Erro ao buscar dados do usuário do Firestore:', error);
        }
      } else {
        window.location.href = 'index.html';
      }
    });

    const btnLogout = document.getElementById('btnLogout');

<script src="../utils/default.js"></script><script src="../data/simulacoes.js"></script><script>
document.addEventListener("DOMContentLoaded", () => {
  const galeria = document.getElementById("galeriaFotos");
  const input = document.getElementById("uploadFoto");
  const btn = document.getElementById("btnSalvarFoto");

  let imagens = carregarLocal("simulacaoGaleria") || [];

  function renderizar() {
    galeria.innerHTML = "";
    imagens.forEach((img, index) => {
      const card = document.createElement("div");
      card.style = "border: 1px solid #ccc; border-radius: 8px; padding: 0.5rem;";
      card.innerHTML = \`
        <img src="\${img.url}" alt="foto" style="width: 120px; height: 120px; object-fit: cover;" />
        <div style="text-align: center; font-size: 0.9rem;">\${img.nome}</div>
      \`;
      galeria.appendChild(card);
    });
  }

  renderizar();

  btn?.addEventListener("click", () => {
    const file = input.files[0];
    if (!file) return alert("Selecione uma imagem!");
    const reader = new FileReader();
    reader.onload = function(e) {
      imagens.push({ nome: file.name, url: e.target.result });
      salvarLocal("simulacaoGaleria", imagens);
      renderizar();
      input.value = "";
    };
    reader.readAsDataURL(file);
  });
});
</script></body>
