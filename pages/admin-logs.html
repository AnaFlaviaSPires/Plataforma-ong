<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Logs de Auditoria - ONG Novo Amanhã</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="../css/themes.css" rel="stylesheet"/>
<link href="../css/variables.css" rel="stylesheet"/>
<link href="../css/config-styles.css" rel="stylesheet"/>
<link href="../css/global.css" rel="stylesheet"/>
<link href="../css/navbar.css" rel="stylesheet"/>
<link href="../css/cards.css" rel="stylesheet"/>
<link href="../css/background-pattern.css" rel="stylesheet"/>
<script defer src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="../js/translations.js"></script>
<script defer src="../js/settings.js"></script>
<script defer src="../js/navbar.js"></script>
</head>
<body>
<div class="bg-pattern"></div>
<div class="top-gradient"></div>

<div class="container py-5 mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">
            <i class="bi bi-shield-check me-2"></i>
            <span data-i18n="audit_logs">Logs de Auditoria</span>
        </h1>
        <a href="menu.html" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i><span data-i18n="back">Voltar</span>
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <!-- Filtros -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <input type="text" id="filterUser" class="form-control" placeholder="Usuário..." data-i18n="user">
                </div>
                <div class="col-md-3">
                    <select id="filterAction" class="form-select">
                        <option value="" data-i18n="all">Todas as Ações</option>
                        <option value="LOGIN">LOGIN</option>
                        <option value="CREATE">CREATE</option>
                        <option value="UPDATE">UPDATE</option>
                        <option value="DELETE">DELETE</option>
                        <option value="APPROVE">APPROVE</option>
                        <option value="FORBIDDEN">FORBIDDEN</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="loadLogs()" data-i18n="filter">Filtrar</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-sm small">
                    <thead>
                        <tr>
                            <th data-i18n="date">Data</th>
                            <th data-i18n="user">Usuário</th>
                            <th data-i18n="action">Ação</th>
                            <th>Tabela</th>
                            <th data-i18n="details">Detalhes</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody">
                        <tr><td colspan="5" class="text-center">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Paginação simples -->
            <nav class="mt-3">
                <ul class="pagination justify-content-center" id="pagination">
                    <!-- JS preenche -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script>
const API_BASE_URL = window.API_BASE_URL || 'http://localhost:3003/api';
let currentPage = 1;

document.addEventListener('DOMContentLoaded', () => {
    checkAdmin();
    loadLogs();
});

function checkAdmin() {
    try {
        const userData = JSON.parse(localStorage.getItem('userData'));
        if (!userData || userData.cargo !== 'admin') {
            alert('Acesso negado.');
            window.location.href = 'menu.html';
        }
    } catch(e) {
        window.location.href = '../index.html';
    }
}

async function loadLogs(page = 1) {
    currentPage = page;
    const token = localStorage.getItem('authToken');
    const tbody = document.getElementById('logsTableBody');
    const usuario = document.getElementById('filterUser').value;
    const acao = document.getElementById('filterAction').value;
    
    tbody.innerHTML = '<tr><td colspan="5" class="text-center">Carregando...</td></tr>';
    
    try {
        let url = `${API_BASE_URL}/logs?page=${page}&limit=20`;
        if (usuario) url += `&usuario=${encodeURIComponent(usuario)}`;
        if (acao) url += `&acao=${encodeURIComponent(acao)}`;
        
        const resp = await fetch(url, { 
            headers: { 'Authorization': `Bearer ${token}` } 
        });
        const data = await resp.json(); // { logs: [], pagination: {} }
        
        if (!resp.ok) throw new Error(data.error || 'Erro ao carregar logs');

        tbody.innerHTML = '';
        
        if (data.logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Nenhum log encontrado.</td></tr>';
            return;
        }

        data.logs.forEach(log => {
            let badgeClass = 'bg-secondary';
            if (log.acao === 'CREATE') badgeClass = 'bg-success';
            if (log.acao === 'UPDATE') badgeClass = 'bg-warning text-dark';
            if (log.acao === 'DELETE') badgeClass = 'bg-danger';
            if (log.acao === 'FORBIDDEN') badgeClass = 'bg-dark';
            if (log.acao === 'APPROVE') badgeClass = 'bg-info text-dark';

            const detalhes = log.dados_novos ? JSON.stringify(log.dados_novos).substring(0, 50) + '...' : '-';

            const row = `
                <tr>
                    <td>${new Date(log.created_at).toLocaleString()}</td>
                    <td>${log.usuario_nome || 'Sistema'}</td>
                    <td><span class="badge ${badgeClass}">${log.acao}</span></td>
                    <td>${log.tabela_afetada || '-'}</td>
                    <td title='${JSON.stringify(log.dados_novos || {})}'>${detalhes}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
        
        renderPagination(data.pagination);

    } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">${e.message}</td></tr>`;
    }
}

function renderPagination(pagination) {
    const nav = document.getElementById('pagination');
    nav.innerHTML = '';
    
    if (pagination.totalPages <= 1) return;
    
    // Anterior
    nav.innerHTML += `
        <li class="page-item ${pagination.page === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="loadLogs(${pagination.page - 1}); return false;">Anterior</a>
        </li>
    `;
    
    // Próximo
    nav.innerHTML += `
        <li class="page-item ${pagination.page === pagination.totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="loadLogs(${pagination.page + 1}); return false;">Próximo</a>
        </li>
    `;
}
</script>
</body>
</html>
