<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Gestão de Usuários - ONG Novo Amanhã</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="../css/themes.css" rel="stylesheet"/>
<link href="../css/variables.css" rel="stylesheet"/>
<link href="../css/config-styles.css" rel="stylesheet"/>
<link href="../css/global.css" rel="stylesheet"/>
<link href="../css/navbar.css" rel="stylesheet"/>
<link href="../css/cards.css" rel="stylesheet"/>
<link href="../css/background-pattern.css" rel="stylesheet"/>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/translations.js"></script>
<script src="../js/settings.js"></script>
<script src="../js/navbar.js"></script>
</head>
<body>
<div class="bg-pattern"></div>
<div class="top-gradient"></div>

<div class="container py-5 mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">
            <i class="bi bi-people-fill me-2"></i>
            <span data-i18n="users_management">Gestão de Usuários</span>
        </h1>
        <a href="menu.html" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i><span data-i18n="back">Voltar</span>
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white py-3">
            <ul class="nav nav-tabs card-header-tabs" id="userTabs">
                <li class="nav-item">
                    <a class="nav-link active" href="#" onclick="loadUsers('pendente'); return false;" data-i18n="pending">Pendentes</a>
                </li>
                <!-- Futuramente implementar listagem geral se necessário -->
                <!-- <li class="nav-item"><a class="nav-link" href="#">Todos</a></li> -->
            </ul>
        </div>
        <div class="card-body">
            <p class="text-muted mb-3" data-i18n="users_desc">Usuários aguardando aprovação para acessar o sistema.</p>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th data-i18n="name">Nome</th>
                            <th data-i18n="email">Email</th>
                            <th data-i18n="registration_date">Cadastro</th>
                            <th class="text-end" data-i18n="actions">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="4" class="text-center">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Aprovação -->
<div class="modal fade" id="approveModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" data-i18n="approve">Aprovar Usuário</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="approveUserId">
        <p>Defina o perfil de acesso para <strong id="approveUserName"></strong>:</p>
        <div class="mb-3">
            <label class="form-label" data-i18n="user_role">Cargo</label>
            <select class="form-select" id="approveRole">
                <option value="secretaria" selected>Secretaria</option>
                <option value="professor">Professor</option>
                <option value="assistente_social">Assistente Social</option>
                <option value="admin">Coordenador (Admin)</option>
            </select>
        </div>
        <div class="alert alert-info small">
            <i class="bi bi-info-circle"></i> O usuário receberá um e-mail de notificação.
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cancel">Cancelar</button>
        <button type="button" class="btn btn-success" onclick="confirmApprove()" data-i18n="approve">Aprovar Acesso</button>
      </div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script>
const API_BASE_URL = window.API_BASE_URL || 'http://localhost:3003/api';

document.addEventListener('DOMContentLoaded', () => {
    checkAdmin();
    loadUsers('pendente'); // Carrega pendentes por padrão
    
    // Configurar abas
    document.querySelectorAll('#userTabs .nav-link').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelectorAll('#userTabs .nav-link').forEach(l => l.classList.remove('active'));
            this.classList.add('active');
            const filter = this.getAttribute('data-filter') || 'todos';
            // Se for pendente, filter='pendente', senão 'todos'
            // No HTML, coloquei onclick loadUsers('pendente'). Vou remover onclick do HTML para usar este listener limpo.
            loadUsers(this.textContent.trim() === 'Pendentes' ? 'pendente' : 'todos');
        });
    });
});

function checkAdmin() {
    try {
        const userData = JSON.parse(localStorage.getItem('userData'));
        if (!userData || userData.cargo !== 'admin') {
            alert('Acesso negado.');
            window.location.href = 'menu.html';
        }
    } catch(e) {
        window.location.href = '../index.html';
    }
}

async function loadUsers(filter = 'todos') {
    const token = localStorage.getItem('authToken');
    const tbody = document.getElementById('usersTableBody');
    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Carregando...</td></tr>';
    
    try {
        let url = `${API_BASE_URL}/auth/users`;
        if (filter === 'pendente') {
            url += '?ativo=false';
        }
        // Se filter == 'todos', não passa ativo, traz tudo.
        
        const resp = await fetch(url, { 
            headers: { 'Authorization': `Bearer ${token}` } 
        });
        const users = await resp.json();
        
        if (!resp.ok) throw new Error(users.error || 'Erro ao carregar');

        tbody.innerHTML = '';
        
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhum usuário encontrado.</td></tr>';
            return;
        }

        users.forEach(u => {
            const row = `
                <tr>
                    <td>${u.nome}</td>
                    <td>${u.email}</td>
                    <td>${new Date(u.createdAt || u.created_at).toLocaleDateString()}</td>
                    <td class="text-end">
                        ${!u.ativo ? `
                        <button class="btn btn-sm btn-success" onclick="openApprove(${u.id}, '${u.nome.replace(/'/g, "\\'")}')">
                            <i class="bi bi-check-circle"></i> Aprovar
                        </button>` : 
                        `<span class="badge bg-secondary">${u.cargo}</span>`
                        }
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    } catch (e) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">${e.message}</td></tr>`;
    }
}

window.openApprove = function(id, nome) {
    document.getElementById('approveUserId').value = id;
    document.getElementById('approveUserName').textContent = nome;
    new bootstrap.Modal(document.getElementById('approveModal')).show();
}

window.confirmApprove = async function() {
    const id = document.getElementById('approveUserId').value;
    const cargo = document.getElementById('approveRole').value;
    const token = localStorage.getItem('authToken');
    const btn = document.querySelector('#approveModal .btn-success');
    
    btn.disabled = true;
    btn.textContent = 'Aprovando...';
    
    try {
        const resp = await fetch(`${API_BASE_URL}/auth/users/${id}/approve`, {
            method: 'PATCH',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ cargo })
        });
        
        if (resp.ok) {
            alert('Usuário aprovado com sucesso!');
            window.location.reload();
        } else {
            const data = await resp.json();
            alert(data.error || 'Erro ao aprovar');
        }
    } catch (e) {
        alert('Erro de conexão');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Aprovar Acesso';
    }
}
</script>
</body>
</html>
